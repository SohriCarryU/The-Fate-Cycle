<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮生十梦</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="index.css">
    <!-- Add Marked.js library for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify: sanitize rendered HTML to prevent XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <!-- Add pako for Gzip decompression -->
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <!-- Add fast-json-patch for incremental state updates -->
    <script src="https://cdn.jsdelivr.net/npm/fast-json-patch@3.1.1/dist/fast-json-patch.min.js"></script>

    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "t8hrcju0wy");
    </script>
</head>

<body>
    <img id="scene-background-image" alt="" aria-hidden="true">
    <div id="app-container">
        <!-- Login View -->
        <div id="login-view" class="view active">
            <h1>浮生十梦</h1>
            <p>此乃试炼之地，请先表明身份。</p>
            <p id="login-help" class="login-help">朋友试玩：输入一个 2-32 位道号；如果房主给了邀请码，也请一并填写。</p>
            <form id="login-form">
                <input type="text" id="login-username" name="username" maxlength="32" autocomplete="username" placeholder="道号" required>
                <input type="password" id="login-invite-code" name="invite_code" autocomplete="off" placeholder="邀请码">
                <button type="submit" id="login-button" class="login-button">进入试炼</button>
                <p id="login-status" class="login-status" role="status" aria-live="polite"></p>
            </form>
            <p id="login-error" class="error-message" role="alert"></p>
        </div>

        <!-- Game View -->
        <div id="game-view" class="view">
            <header id="game-header">
                <h1>浮生一梦</h1>
                <div id="game-status">
                    <span>剩余机缘: <span id="opportunities">10</span></span>
                    <button id="status-toggle-button" class="header-button" type="button" aria-controls="status-panel" aria-expanded="true">收起状态</button>
                    <button id="logout-button" class="header-button">登出</button>
                </div>
            </header>
            <div id="connection-banner" class="connection-banner connection-idle" role="status" aria-live="polite" aria-atomic="true" data-status="idle">正在检查试玩会话...</div>

            <aside id="status-panel">
                <!-- Character status will be rendered here -->
                <div class="status-panel-header">
                    <p>【人物业力】</p>
                    <button id="status-close-button" class="header-button" type="button" aria-controls="status-panel">收起</button>
                </div>
                <button id="status-rail-button" type="button" aria-controls="status-panel" aria-label="展开人物业力">人物业力</button>
                <div id="character-status"></div>
            </aside>

            <main id="main-content">
                <div id="narrative-window">
                    <!-- Game narrative will be appended here -->
                </div>
            </main>

            <footer id="action-area">
                <p id="action-status" class="action-status" role="status" aria-live="polite"></p>
                <div class="action-input-row">
                    <input type="text" id="action-input" placeholder="汝欲何为..." disabled>
                    <button id="action-button" disabled>定</button>
                </div>
                <button id="start-trial-button" class="hidden">开启下一次试炼</button>
            </footer>
        </div>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="spinner-overlay" style="display: none;">
            <div class="spinner"></div>
        </div>

        <!-- Roll Animation Overlay -->
        <div id="roll-overlay" class="hidden">
            <div id="roll-panel">
                <div class="dice-cup">🎲</div>
                <div id="roll-details">
                    <span id="roll-type"></span>
                    <span id="roll-target"></span>
                </div>
                <div id="roll-result-display" class="hidden">
                    <span id="roll-outcome"></span>
                    <span id="roll-value"></span>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="index.js"></script>
</body>

</html>
